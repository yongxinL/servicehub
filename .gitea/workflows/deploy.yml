name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - authentik
          - gitea
          - wordpress
          - openmaic
          - mariadb
          - pgsqldb
          - gitrunner
      environment:
        description: 'Target environment'
        required: true
        default: 'stag'
        type: choice
        options:
          - stag
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve environment
        id: env
        run: |
          echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.environment }}" = "stag" ]; then
            echo "host=${{ secrets.STAG_SERVER_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.STAG_SERVER_USER }}" >> $GITHUB_OUTPUT
            echo "password=${{ secrets.STAG_SERVER_PASS }}" >> $GITHUB_OUTPUT
            echo "path=${{ secrets.STAG_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "env_b64=${{ secrets.STAG_B64ENC_ENVS }}" >> $GITHUB_OUTPUT
            echo "acme_b64=${{ secrets.STAG_B64ENC_ACME }}" >> $GITHUB_OUTPUT
          else
            echo "host=${{ secrets.PROD_SERVER_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.PROD_SERVER_USER }}" >> $GITHUB_OUTPUT
            echo "password=${{ secrets.PROD_SERVER_PASS }}" >> $GITHUB_OUTPUT
            echo "path=${{ secrets.PROD_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "env_b64=${{ secrets.PROD_B64ENC_ENVS }}" >> $GITHUB_OUTPUT
            echo "acme_b64=${{ secrets.PROD_B64ENC_ACME }}" >> $GITHUB_OUTPUT
          fi

      - name: Install sshpass
        run: apt-get update && apt-get install -y sshpass

      - name: Deploy to Server
        env:
          SERVICE: ${{ github.event.inputs.service }}
          SERVER_HOST: ${{ steps.env.outputs.host }}
          SERVER_USER: ${{ steps.env.outputs.user }}
          SERVER_PASSWORD: ${{ steps.env.outputs.password }}
          DEPLOY_PATH: ${{ steps.env.outputs.path }}
          # GITEA_TOKEN is automatically injected by Gitea Actions for the current repo
          GIT_TOKEN: ${{ secrets.GITEA_TOKEN }}
          ENV_B64: ${{ steps.env.outputs.env_b64 }}
          ACME_B64: ${{ steps.env.outputs.acme_b64 }}
        run: |
          if command -v docker-compose > /dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi

          if [ "$SERVICE" = "all" ]; then
            COMPOSE_CMD="$DC up --build -d"
          else
            COMPOSE_CMD="$DC up -d --build $SERVICE"
          fi

          ssh_exec() {
            sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "$@"
          }

          # Build authenticated repo URL using Gitea's built-in token and context variables.
          # gitea.server_url and gitea.repository are provided automatically by Gitea Actions.
          REPO_URL="${{ gitea.server_url }}/${{ gitea.repository }}.git"
          AUTH_REPO_URL=$(echo "$REPO_URL" | sed "s|://|://oauth2:${GIT_TOKEN}@|")

          # Clone repo on first deploy, or pull latest code on subsequent deploys.
          # Remote URL is updated each run to keep the token current.
          ssh_exec "set -e && if [ -d '$DEPLOY_PATH/.git' ]; then cd '$DEPLOY_PATH' && git remote set-url origin '$AUTH_REPO_URL' && git pull origin main; else mkdir -p '$DEPLOY_PATH' && git clone '$AUTH_REPO_URL' '$DEPLOY_PATH'; fi && cd '$DEPLOY_PATH' && bash scripts/setup.sh"

          # Override .env with the encoded secret
          if [ -n "$ENV_B64" ]; then
            echo "$ENV_B64" | ssh_exec "base64 -d > '$DEPLOY_PATH/.env' && chmod 600 '$DEPLOY_PATH/.env'"
          fi

          # Restore acme.json only when the secret contains data.
          # For STAG with self-signed certs, leave STAG_B64ENC_ACME unset in Gitea
          # and Traefik will fall back to the certificate defined in certificates.yml.
          if [ -n "$ACME_B64" ]; then
            echo "$ACME_B64" | ssh_exec "mkdir -p '$DEPLOY_PATH/shared/letsencrypt' && base64 -d | gunzip > '$DEPLOY_PATH/shared/letsencrypt/acme.json' && chmod 600 '$DEPLOY_PATH/shared/letsencrypt/acme.json'"
          fi

          # Deploy
          ssh_exec "cd '$DEPLOY_PATH' && $COMPOSE_CMD"
          echo "Deployment of $SERVICE to ${{ github.event.inputs.environment }} completed"
