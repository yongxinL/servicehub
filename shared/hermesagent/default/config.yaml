# =============================================================================
# Hermes Agent — default profile config.yaml
# Copy to /opt/data/hermesagent/profiles/<name>/config.yaml and edit.
# Full reference: https://hermes-agent.nousresearch.com/docs/user-guide/configuration
# =============================================================================

# LLM — routes through LiteLLM proxy (complexity-based routing).
# <your-litellm-api-base> and <your-litellm-master-key> are substituted at
# container start by start-gateways.sh from the LITELLM_API_URL and
# LITELLM_API_KEY env vars (set in compose/agent.yml).
custom_providers:
- name: LiteLLM
  base_url: <your-litellm-api-base>
  api_key: <your-litellm-master-key>
  model: hermes

model:
  default: hermes
  provider: custom
  base_url: <your-litellm-api-base>
  api_key: <your-litellm-master-key>

# ---------------------------------------------------------------------------
# API server port — set a unique port per profile when running multiple profiles
# in the same container. The default profile uses 12330; named profiles start at 8643.
# Default profile:            12330  (no change needed)
# Profile 1 (e.g. alice):    8643
# Profile 2 (e.g. bob):      8644
# Profile 3 (e.g. charles):  8645
# ---------------------------------------------------------------------------
api_server:
  port: 12330

# ---------------------------------------------------------------------------
# Terminal sandbox — Docker isolation
# Hermes runs agent commands inside a fresh Docker container, not on the host.
# docker_forward_env: variables passed from Hermes env into the sandbox.
# The hermes container needs /var/run/docker.sock mounted (see agent.yml).
# ---------------------------------------------------------------------------
terminal:
  backend: docker
  docker_image: "nikolaik/python-nodejs:python3.11-nodejs20"
  docker_mount_cwd_to_workspace: false  # Mount launch dir into /workspace
  docker_run_as_host_user: false   # See "Running container as host user" below
  docker_forward_env:              # Env vars to forward into container
    - FIRECRAWL_API_URL
    - FIRECRAWL_API_KEY
  docker_volumes:
    - "/opt/containerd/serviceHub/sandbox:/home"

  # Resource limits
  container_cpu: 1.0
  container_memory: 2048
  container_disk: 10240
  container_persistent: true

  # Connect sandbox to servicehub_subnet so it can reach FastCRW/LiteLLM
  docker_network: "servicehub_subnet"

# Browser — CDP connection to the Chromium renderer in the same stack.
# token= uses the same key as FastCRW auth, substituted at startup.
# Switch cdp_url to ws://agsvclighpda:9222/ for the lighter LightPanda renderer.
browser:
  cdp_url: "ws://agsvcchromum:12363/chromium?token=<your-firecrawl-api-key>&stealth=true"

# Web — FastCRW handles both search (/v1/search → SearXNG internally) and
# scraping (/v1/scrape). No separate SearXNG connection needed.
# base_url and api_key placeholders are substituted at container start by
# start-gateways.sh from the FIRECRAWL_API_URL and FIRECRAWL_API_KEY env vars.
web:
  backend: firecrawl
  base_url: <your-firecrawl-api-url>
  api_key: <your-firecrawl-api-key>

# Memory
memory:
  provider: local
