# Scrape configuration for VictoriaMetrics
# Scrape metrics from Grafana Alloy (host + container + traefik metrics)

scrape_configs:
    # Scrape Alloy's metrics endpoint (host + container + traefik metrics)
    - job_name: 'alloy'
      static_configs:
          - targets: ['secobgrafaly:9080']

    # Scrape LiteLLM Proxy metrics (Prometheus format on UI port)
    - job_name: 'litellm'
      metrics_path: '/metrics'
      static_configs:
          - targets: ['agsvclitellm:12380']
            labels:
              service: litellm
