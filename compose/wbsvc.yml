services:
    # Gitea data + config permission init
    wbsvcrepoint:
        command: >
            sh -c 'chown -R 1000:1000 /data /config 2>/dev/null; chmod -R 755 /data /config 2>/dev/null || true'
        image: busybox:latest
        networks:
            - subnet
        user: root
        volumes:
            - ${APPS_DATA}/repbuk/data:/data
            - ${APPS_DATA}/repbuk/config:/config

    # Gitea: self-hosted software development service
    wbsvcrepobuk:
        build:
            context: ../shared/gitea/
        depends_on:
            wbsvcrepoint:
                condition: service_completed_successfully
            infratraefik:
                condition: service_healthy
            infrapgsqldb:
                condition: service_healthy
        environment:
            # Using MySQL for databases
            - GITEA__database__DB_TYPE=postgres
            - GITEA__database__HOST=${PGRSQL_HOST}:${PGRSQL_PORT}
            - GITEA__database__NAME=${GIT_DBNAME}
            - GITEA__database__USER=${SQLDB_USER}
            - GITEA__database__PASSWD=${SQLDB_PASS}
            # Disable openID authentication and login
            - GITEA__openid__ENABLE_OPENID_SIGNIN=false
            - GITEA__openid__ENABLE_OPENID_SIGNUP=false
            # Changing the global default branch
            - GITEA__repository__DEFAULT_BRANCH=master
            # Disable SSH feature
            - GITEA__server__DISABLE_SSH=true
            # Enable this to force users to log in to view any page or to use API
            - GITEA__service__REQUIRE_SIGNIN_VIEW=true
            # Disable registration, only admin can create accounts for users.
            - GITEA__service__DISABLE_REGISTRATION=true
            # Disable passkey login
            - GITEA__service__ENABLE_PASSKEY_AUTHENTICATION=false
            # Show the password login form, set to true when linking oAuth user
            - EGITEA__service__ENABLE_PASSWORD_SIGNIN_FORM=false
            # default Gitea custom folder
            - GITEA_CUSTOM=/var/lib/custom
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
            start_period: 20s
            interval: 30s
            retries: 5
            timeout: 5s
        image: wbsvcrepobuk:latest
        labels:
            # Enable Traefik for this container
            - "traefik.enable=true"
            # Use the 'websecure' (HTTPS) entry point
            - "traefik.http.routers.wbsvcrepobuk.entrypoints=websecure"
            # Match incoming requests on a specific hostname
            - "traefik.http.routers.wbsvcrepobuk.rule=Host(`${GIT_DOMAIN}`)"
            # Assign the router to a named Traefik service
            - "traefik.http.routers.wbsvcrepobuk.service=wbsvcrepobuk"
            # Define the internal container port for routing
            - "traefik.http.services.wbsvcrepobuk.loadbalancer.server.port=3000"
            # Enable TLS on this router
            - "traefik.http.routers.wbsvcrepobuk.tls=true"
            # Use Let's Encrypt for certificate management or Self-signed certificate
            - "traefik.http.routers.wbsvcrepobuk.tls.certresolver=${CERTRESOLVER}"
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - ${APPS_DATA}/repbuk/data:/var/lib/gitea
            - ${APPS_DATA}/repbuk/config:/etc/gitea
            - ../shared/gitea/custom:/var/lib/custom

    # Gitea Act Runner - executes CI/CD workflows
    # https://codeberg.org/gitea/act_runner
    wbsvcreporun:
        build:
            context: ../shared/gitea/runner/
        depends_on:
            wbsvcrepobuk:
                condition: service_healthy
        environment:
            - GITEA_INSTANCE_URL=https://${GIT_DOMAIN}
            - GITEA_RUNNER_REGISTRATION_TOKEN=${GIT_RUNNER_TOKEN}
        image: wbsvcreporun:latest
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            # Mount Docker socket for running docker commands in workflows
            - /var/run/docker.sock:/var/run/docker.sock
            # Runner data persistence
            - ${APPS_DATA}/repbuk/runner:/data

    # WordPress - CMS and blogging platform
    wbsvcwebhome:
        build:
            context: ../shared/wordpress/
        depends_on:
            infratraefik:
                condition: service_healthy
            inframariadb:
                condition: service_healthy
            wbsvcauthtik:
                condition: service_started
        environment:
            - WORDPRESS_DB_HOST=${MySQL_HOST}
            - WORDPRESS_DB_NAME=${WP_DBNAME:-wordpress}
            - WORDPRESS_DB_USER=${SQLDB_USER}
            - WORDPRESS_DB_PASSWORD=${SQLDB_PASS}
        image: wbsvcwebhome:latest
        labels:
            # Enable Traefik for this container
            - "traefik.enable=true"
            # Use the 'websecure' (HTTPS) entry point
            - "traefik.http.routers.wbsvcwebhome.entrypoints=websecure"
            # Match incoming requests on a specific hostname
            - "traefik.http.routers.wbsvcwebhome.rule=Host(`${WP_DOMAIN}`) || Host(`${DOMAIN_NAME}`)"
            # Assign the router to a named Traefik service
            - "traefik.http.routers.wbsvcwebhome.service=wbsvcwebhome"
            # Define the internal container port for routing
            - "traefik.http.services.wbsvcwebhome.loadbalancer.server.port=80"
            # Enable TLS on this router
            - "traefik.http.routers.wbsvcwebhome.tls=true"
            # Use Let's Encrypt for certificate management or Self-signed certificate
            - "traefik.http.routers.wbsvcwebhome.tls.certresolver=${CERTRESOLVER}"
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - ${APPS_DATA}/webhome:/var/www/html
