services:
    # MariaDB - MySQL-compatible relational database
    inframariadb:
        build:
            context: ../shared/mariadb/
        environment:
            - MARIADB_USER=${SQLDB_USER}
            - MARIADB_PASSWORD=${SQLDB_PASS}
            - MARIADB_ROOT_PASSWORD=${SQLDB_PASS}
            - MARIADB_DB_LIST=${MARIADB_DB_LIST}
        healthcheck:
            test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 3
        image: inframariadb:latest
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - ${APPS_DATA}/inframariadb:/var/lib/mysql

    # PostgreSQL - Advanced open source relational database
    infrapgsqldb:
        build:
            context: ../shared/postgresql/
        environment:
            - POSTGRES_USER=${SQLDB_USER}
            - POSTGRES_PASSWORD=${SQLDB_PASS}
            - POSTGRES_DB_LIST=${PGRSQL_DBLIST:-defaultdb}
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -d $${PGRSQL_DBLIST%%,*} -U $${PGRSQL_USER}" ]
            start_period: 20s
            interval: 30s
            retries: 5
            timeout: 5s
        image: infrapgsqldb:latest
        networks:
            - subnet
        restart: unless-stopped
        shm_size: 128mb
        volumes:
            - ${APPS_DATA}/infrapgsqldb:/var/lib/postgresql/data

    # Traefik 3 Reverse Proxy Server
    infratraefik:
        build:
            context: ../shared/traefik/
        command:
            # Disable sending anonymous usage data to the Traefik maintainers
            - "--global.sendAnonymousUsage=false"
            # Check for newer Traefik versions
            - "--global.checkNewVersion=false"
            # Enable the built-in API and web-based dashboard
            - "--api=true"
            # Enable the /ping endpoint so we can health-check Traefik
            - "--ping=true"
            # Define the primary HTTP entry point on port 80
            - "--entryPoints.web.address=:80"
            # Define the secure (HTTPS) entry point on port 443
            - "--entryPoints.websecure.address=:443"
            # force redirection of incoming from web to websecure
            - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
            - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
            - "--entrypoints.web.http.redirections.entryPoint.priority=100"
            # Set the IPs or CIDR for where Treafik trusts the forwarded headers
            - "--entryPoints.web.forwardedHeaders.trustedIPs=${TRUSTED_IP}"
            - "--entryPoints.websecure.forwardedHeaders.trustedIPs=${TRUSTED_IP}"
            # Enable the Docker provider to detect containers and their labels
            - "--providers.docker=true"
            # Prevent automatic exposure of all containers; only expose containers
            - "--providers.docker.exposedbydefault=false"
            # file provider configuration
            - "--providers.file.directory=/traefik/config/advanced"
            # Use ACME (Let's Encrypt) to generate/renew certificates via TLS challenge
            - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
            # The email address used by Let's Encrypt for renewal notices
            - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
            # The file where ACME certificates are stored inside the container
            - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
            # activate access logging
            - "--accesslog=true"
            # Set the log level (DEBUG, INFO, WARN, ERROR)
            - "--log.level=INFO"
        environment:
            - TZ=${TIME_ZONE}
        healthcheck:
            test: [ "CMD", "traefik", "healthcheck", "--ping" ]
            interval: 60s
            timeout: 5s
            retries: 3
            start_period: 5s
        image: infratraefik:latest
        labels:
            # Enable Traefik for this container
            - "traefik.enable=true"
            # Use the 'websecure' (HTTPS) entry point
            - "traefik.http.routers.dashboard.entrypoints=websecure"
            # Match incoming requests on a specific hostname
            - "traefik.http.routers.dashboard.rule=Host(`${TRAFIK_DOMAIN}`)"
            # Define the internal service for routing
            - "traefik.http.routers.dashboard.service=api@internal"
            # Enable TLS on this router
            - "traefik.http.routers.dashboard.tls=true"
            # uncomment for basicAuth
            # all dollar signs in the hash need to be double for escaping.
            # to create a user:password pair, the following command can be used
            # echo $(htpasswd -nb user "password") | sed -e s/\\$/\\$\\$/g
            # - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
            # - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAFIK_BAAUTH}"
            # uncomment for middleware-limiting clients to specific IPs, disabled when Forward-Auth enabled.
            # - "traefik.http.routers.dashboard.middlewares=dashboard-whitelist"
            # - "traefik.http.middlewares.dashboard-whitelist.ipallowlist.sourcerange=${TRUSTED_IP}"
            # uncomment when Domain Level Forward Authentication enabled in Authentik
            - "traefik.http.routers.dashboard.middlewares=authentik-forwardauth@file"
            # Use Let's Encrypt for certificate management or Self-signed certificate
            - "traefik.http.routers.dashboard.tls.certresolver=${CERTRESOLVER}"
        networks:
            - subnet
        ports:
            - 80:80
            - 443:443
        privileged: true
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ../shared/traefik/advanced:/traefik/config/advanced:ro
            - ../shared/letsencrypt:/letsencrypt
