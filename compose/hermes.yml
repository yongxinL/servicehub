services:
    # Hermes Agent Gateway - API server + chat platforms integration
    # https://hermes-agent.nousresearch.com
    hermesagent:
        build:
            context: ../shared/hermes/
        command: gateway run
        environment:
            - TZ=${TIME_ZONE}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8642/health"]
            interval: 60s
            timeout: 5s
            retries: 3
            start_period: 5s
        image: hermesagent
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - ${APPS_DATA}/webapps/hermes:/opt/data

    # Hermes Agent Dashboard - Web UI for monitoring and interaction
    hermesdash:
        command: dashboard --host 0.0.0.0 --insecure
        depends_on:
            traefik:
                condition: service_healthy
            hermesagent:
                condition: service_started
        environment:
            - TZ=${TIME_ZONE}
            - GATEWAY_HEALTH_URL=http://hermesagent:8642
        image: hermesagent
        labels:
            # Enable Traefik for this container
            - "traefik.enable=true"
            # Use the 'websecure' (HTTPS) entry point
            - "traefik.http.routers.hermesdash.entrypoints=websecure"
            # Match incoming requests on a specific hostname
            - "traefik.http.routers.hermesdash.rule=Host(`${HERMES_DOMAIN}`)"
            # Assign the router to a named Traefik service
            - "traefik.http.routers.hermesdash.service=hermesdash"
            # Define the internal container port for routing
            - "traefik.http.services.hermesdash.loadbalancer.server.port=9119"
            # Enable TLS on this router
            - "traefik.http.routers.hermesdash.tls=true"
            # Use Let's Encrypt for certificate management or Self-signed certificate
            - "traefik.http.routers.hermesdash.tls.certresolver=${CERTRESOLVER}"
        networks:
            - subnet
        restart: unless-stopped
        volumes:
            - ${APPS_DATA}/webapps/hermes:/opt/data
